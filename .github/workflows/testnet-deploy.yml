name: Deploy Contracts to VeChainThor Testnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm testnet deployment'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  deploy-contracts:
    name: Deploy DPP + Marketplace to VeChainThor Testnet
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run compile --workspace=@nama/contracts

      - name: Validate Ignition modules
        run: npm run ignition:validate --workspace=@nama/contracts

      - name: Validate deployer key format and derived address
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs')
          const { Wallet, getAddress } = require('ethers')

          const rawKey = process.env.DEPLOYER_PRIVATE_KEY ?? ''
          const trimmedKey = rawKey.trim()
          const secretPresent = trimmedKey.length > 0
          const hasPrefix = trimmedKey.startsWith('0x')
          const keyBody = hasPrefix ? trimmedKey.slice(2) : trimmedKey
          const normalizedKey = `0x${keyBody}`
          const validLength = keyBody.length === 64
          const validHex = /^[0-9a-fA-F]{64}$/.test(keyBody)

          console.log(`secret present: ${secretPresent ? 'yes' : 'no'}`)
          console.log(`has 0x prefix: ${hasPrefix ? 'yes' : 'no'}`)
          console.log(`normalized length: ${normalizedKey.length}`)
          console.log(`hex format valid: ${validHex ? 'yes' : 'no'}`)

          if (!secretPresent || !validLength || !validHex) {
            console.error(
              'DEPLOYER_PRIVATE_KEY is not a valid private key. Do not use wallet address, QR receive address, password, or seed phrase.',
            )
            process.exit(1)
          }

          let deployerAddress
          try {
            deployerAddress = new Wallet(normalizedKey).address
          } catch {
            console.error(
              'DEPLOYER_PRIVATE_KEY is not a valid private key. Do not use wallet address, QR receive address, password, or seed phrase.',
            )
            process.exit(1)
          }

          console.log(`derived deployer address: ${deployerAddress}`)
          fs.writeFileSync(
            `${process.env.RUNNER_TEMP}/derived-deployer-address`,
            deployerAddress,
            { mode: 0o600 },
          )

          const expectedAddress = (process.env.EXPECTED_DEPLOYER_ADDRESS ?? '').trim()
          if (expectedAddress) {
            let normalizedExpectedAddress
            try {
              normalizedExpectedAddress = getAddress(expectedAddress)
            } catch {
              console.error('EXPECTED_DEPLOYER_ADDRESS is not a valid address.')
              process.exit(1)
            }
            if (normalizedExpectedAddress !== deployerAddress) {
              console.error(
                'Derived deployer address does not match EXPECTED_DEPLOYER_ADDRESS.',
              )
              process.exit(1)
            }
          }
          NODE

          DERIVED_DEPLOYER_ADDRESS="$(cat "$RUNNER_TEMP/derived-deployer-address")"
          ACCOUNT_URL="${VECHAIN_TESTNET_RPC_URL%/}/accounts/$DERIVED_DEPLOYER_ADDRESS"
          if ACCOUNT_RESPONSE="$(curl --fail --silent --show-error --max-time 15 "$ACCOUNT_URL")"; then
            if ! ACCOUNT_RESPONSE="$ACCOUNT_RESPONSE" node <<'NODE'
          const account = JSON.parse(process.env.ACCOUNT_RESPONSE)
          if (
            typeof account.balance !== 'string' ||
            typeof account.energy !== 'string' ||
            typeof account.hasCode !== 'boolean'
          ) {
            throw new Error('unexpected account response')
          }
          console.log(`balance: ${account.balance}`)
          console.log(`energy: ${account.energy}`)
          console.log(`hasCode: ${account.hasCode}`)
          NODE
            then
              echo "::warning::VeChainThor testnet account response was unavailable or invalid."
            fi
          else
            echo "::warning::VeChainThor testnet account query was unavailable."
          fi
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          EXPECTED_DEPLOYER_ADDRESS: ${{ vars.EXPECTED_DEPLOYER_ADDRESS }}
          VECHAIN_TESTNET_RPC_URL: ${{ vars.VECHAIN_TESTNET_RPC_URL || 'https://testnet.vechain.org' }}

      - name: Deploy DPP contract
        id: deploy-dpp
        run: |
          set -euo pipefail
          cd packages/contracts

          echo "PWD: $(pwd)"
          echo "Deploying DPP module..."
          npx hardhat ignition deploy ignition/modules/DPP.ts --network vechain_testnet --deployment-id nama-testnet 2>&1 | tee /tmp/dpp-deploy.log

          echo "Listing ignition/deployments folders:"
          find ignition/deployments -maxdepth 3 -type d | sort || true

          DEPLOYED_ADDRESSES_FILE="ignition/deployments/nama-testnet/deployed_addresses.json"

          if [ ! -f "$DEPLOYED_ADDRESSES_FILE" ]; then
            echo "ERROR: deployed_addresses.json not found at expected path: $DEPLOYED_ADDRESSES_FILE"
            exit 1
          fi

          echo "Contents of $DEPLOYED_ADDRESSES_FILE:"
          cat "$DEPLOYED_ADDRESSES_FILE"

          DPP_ADDR=$(jq -r '."DPPModule#DPP" // empty' "$DEPLOYED_ADDRESSES_FILE")
          if [ -z "$DPP_ADDR" ]; then
            echo "ERROR: could not find DPPModule#DPP in $DEPLOYED_ADDRESSES_FILE"
            exit 1
          fi

          echo "Parsed DPP address: $DPP_ADDR"
          echo "dpp_address=$DPP_ADDR" >> "$GITHUB_OUTPUT"
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          VECHAIN_TESTNET_RPC_URL: ${{ vars.VECHAIN_TESTNET_RPC_URL || 'https://testnet.vechain.org' }}

      - name: Deploy Marketplace contract
        id: deploy-marketplace
        run: |
          set -euo pipefail
          cd packages/contracts

          echo "PWD: $(pwd)"
          echo "Deploying Marketplace module..."
          npx hardhat ignition deploy ignition/modules/Marketplace.ts --network vechain_testnet --deployment-id nama-testnet 2>&1 | tee /tmp/marketplace-deploy.log

          echo "Listing ignition/deployments folders:"
          find ignition/deployments -maxdepth 3 -type d | sort || true

          DEPLOYED_ADDRESSES_FILE="ignition/deployments/nama-testnet/deployed_addresses.json"

          if [ ! -f "$DEPLOYED_ADDRESSES_FILE" ]; then
            echo "ERROR: deployed_addresses.json not found at expected path: $DEPLOYED_ADDRESSES_FILE"
            exit 1
          fi

          echo "Contents of $DEPLOYED_ADDRESSES_FILE:"
          cat "$DEPLOYED_ADDRESSES_FILE"

          MARKETPLACE_ADDR=$(jq -r '."MarketplaceModule#Marketplace" // empty' "$DEPLOYED_ADDRESSES_FILE")
          if [ -z "$MARKETPLACE_ADDR" ]; then
            echo "ERROR: could not find MarketplaceModule#Marketplace in $DEPLOYED_ADDRESSES_FILE"
            exit 1
          fi

          echo "Parsed Marketplace address: $MARKETPLACE_ADDR"
          echo "marketplace_address=$MARKETPLACE_ADDR" >> "$GITHUB_OUTPUT"
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          VECHAIN_TESTNET_RPC_URL: ${{ vars.VECHAIN_TESTNET_RPC_URL || 'https://testnet.vechain.org' }}

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ignition-deployments
          path: packages/contracts/ignition/deployments
          if-no-files-found: warn

      - name: Print deployed addresses
        run: |
          echo "════════════════════════════════════════════"
          echo "NAMA contracts deployed to VeChainThor Testnet"
          echo "════════════════════════════════════════════"
          echo "DPP:         ${{ steps.deploy-dpp.outputs.dpp_address }}"
          echo "Marketplace: ${{ steps.deploy-marketplace.outputs.marketplace_address }}"
          echo ""
          echo "Next steps:"
          echo "  1. Update packages/shared/src/constants/vechain.ts with these addresses"
          echo "  2. Set VITE_CONTRACT_DPP and VITE_CONTRACT_MARKETPLACE in GitHub Secrets"
          echo "  3. Set DPP_CONTRACT_ADDRESS and MARKETPLACE_CONTRACT_ADDRESS on your indexer host"
          echo "════════════════════════════════════════════"
